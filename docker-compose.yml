services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: tbk-profile:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      DATABASE_URL: file:/app/data/app.db
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET wajib diisi di .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD wajib diisi di .env}
      # Set "true" di .env HANYA setelah situs diakses lewat HTTPS (domain+SSL).
      # Kalau diaktifkan sementara masih akses via HTTP/IP langsung, login admin akan gagal.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      UPLOADS_DIR: /app/uploads
    volumes:
      - db_data:/app/data
      - uploads_data:/app/uploads

volumes:
  db_data:
  uploads_data:
